name: zaman_kapsulu
description: "Zaman Kapsülü — Sesini geleceğe kilitle"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.6
  google_sign_in: ^6.2.2

  # Ses kaydı & oynatma
  record: ^6.0.0
  audioplayers: ^6.1.0

  # Şifreleme
  encrypt: ^5.0.3

  # İzinler
  permission_handler: ^11.3.1

  # Yerel depolama
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
